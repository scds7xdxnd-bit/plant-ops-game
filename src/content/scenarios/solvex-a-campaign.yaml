    learning_goals:
      - "Identify all streams that leave the plant boundary: vents, wastewater, and solid waste."
      - "Map emission sources to required control technologies."
      - "Recognise that environmental permit applications require quantified emission estimates."
      - "Apply the waste-minimisation hierarchy: recover before destroying, contain before treating."
      - "Avoid over-specifying treatment systems before waste characterisation data is available."

    briefing:
      senior_engineer_message: >
        Everything that leaves the plant boundary is regulated. Atmospheric vents, wastewater
        discharge, and solid waste all need to be defined and controlled before we can apply
        for operating permits. Your task is to identify the environmental control decisions
        that are directly supported by the process description and the regulatory requirements
        in the design basis. Be precise about what you know now and what needs more data.

    instructions:
      prompt: >
        Select the environmental control design decisions that are justified by the information
        above. Avoid specifying detailed treatment technology designs before waste characterisation
        data is available.
      selection_rule: "Select all that apply."
      expected_time_minutes: 6

    categories:
      - id: environmental_treatment
        label: "Environmental Treatment"
      - id: process_control_and_safety
        label: "Monitoring & Containment"
      - id: separation_system
        label: "Recovery Before Treatment"
      - id: unsupported_for_now
        label: "Not Justified Yet"

    decision_cards:
      - id: voc_recovery_or_destruction_on_all_vents
        category: environmental_treatment
        label: "Add VOC recovery or destruction on all process and storage vents handling organic materials"
        type: correct
        linked_clues:
          - "Organic vapors can be released from storage, reactor vents, and separation overheads."
          - "VOC emissions must be controlled."
        short_hint: "Every vent handling organic vapors is a potential regulated VOC emission point."

      - id: define_all_wastewater_streams_by_source
        category: environmental_treatment
        label: "Define all wastewater streams by source before designing any treatment system"
        type: correct
        linked_clues:
          - "The aqueous phase contains dissolved catalyst residues and trace organics."
          - "Equipment washing generates wash water."
          - "Catalyst bleed streams are produced during catalyst management."
        short_hint: "Treatment design depends on knowing what is in each wastewater stream."

      - id: ph_neutralization_before_discharge
        category: environmental_treatment
        label: "Include pH neutralization for all acidic or basic wastewater streams before discharge"
        type: correct
        linked_clues:
          - "Wastewater must be neutralized before discharge."
          - "Feed B is a corrosive aqueous catalyst solution."
        short_hint: "Neutralization is explicitly required for wastewater discharge."

      - id: secondary_containment_all_chemical_storage
        category: process_control_and_safety
        label: "Specify secondary containment for all liquid chemical storage areas"
        type: correct
        linked_clues:
          - "Secondary containment spill collection may produce contaminated rainwater."
          - "Feed A is flammable. Feed B is corrosive."
        short_hint: "Secondary containment is required for both environmental protection and safety."

      - id: quantified_emission_estimates_for_permit
        category: environmental_treatment
        label: "Require quantified emission estimates for all regulated streams as part of the environmental permit application"
        type: correct
        linked_clues:
          - "Environmental permit applications require quantified emission estimates for all regulated streams."
        short_hint: "Operating permits require numbers, not just a list of emission points."

      - id: fugitive_emission_monitoring_program
        category: process_control_and_safety
        label: "Include a fugitive emission monitoring program for seals, flanges, and valves in organic service"
        type: correct
        linked_clues:
          - "Organic vapors can be released from the process."
          - "VOC emissions must be controlled."
        short_hint: "Fugitive emissions from equipment in organic service are a regulated VOC source."

      - id: recover_organic_vapor_before_destruction
        category: separation_system
        label: "Recover organic vapors from separation and storage vents for recycle before sending to any destruction device"
        type: correct
        linked_clues:
          - "Separation overhead streams contain organic vapors."
          - "Product storage tanks emit vapors during filling."
        short_hint: "Recover and recycle first — destruction is the last resort in the waste minimisation hierarchy."

      - id: define_disposal_route_for_solid_waste
        category: environmental_treatment
        label: "Confirm the disposal route for catalyst residues and solid waste in the design basis"
        type: correct
        linked_clues:
          - "Spent catalyst and filter residues are generated in small quantities."
        short_hint: "Even small quantities of hazardous solid waste need a confirmed disposal route in the design basis."

      - id: full_biological_ww_treatment_no_data
        category: unsupported_for_now
        label: "Design a full biological wastewater treatment plant at this stage"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Biological treatment feasibility depends on organic loading and biodegradability data not yet available."

      - id: open_flame_flare_for_voc_control
        category: unsupported_for_now
        label: "Use open-flame flaring as the primary VOC control method"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Open-flame flaring is over-engineered for a small specialty chemical plant and creates ignition risk."

      - id: fugitive_emissions_negligible_no_basis
        category: unsupported_for_now
        label: "Treat fugitive emissions from equipment as negligible at the design-basis stage without any basis"
        type: wrong_plausible
        linked_clues:
          - "VOC emissions must be controlled."
        short_hint: "Fugitive emissions are a regulated VOC source — dismissing them without data is not defensible."

      - id: skip_secondary_containment_for_feed_b_aqueous
        category: environmental_treatment
        label: "Omit secondary containment for Feed B because it is aqueous and therefore low environmental risk"
        type: wrong_plausible
        linked_clues:
          - "Feed B is a corrosive aqueous catalyst solution at high concentration."
        short_hint: "Aqueous does not mean environmentally benign — a corrosive catalyst solution requires containment."

      - id: discharge_wastewater_after_neutralization_only
        category: environmental_treatment
        label: "Discharge process wastewater to drain after neutralization with no further quality check"
        type: wrong_plausible
        linked_clues:
          - "The aqueous phase contains dissolved catalyst residues and trace organics."
          - "Wastewater must be neutralized before discharge."
        short_hint: "Neutralization addresses pH only — dissolved organics and catalyst residues may also exceed permit limits."

      - id: env_compliance_as_paperwork_only
        category: unsupported_for_now
        label: "Treat environmental compliance as a later permitting paperwork exercise"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Environmental requirements drive process design decisions — they cannot be deferred to permit application stage."

      - id: ignore_solid_waste_negligible
        category: unsupported_for_now
        label: "Dismiss spent catalyst and filter residues as negligible without a disposal route"
        type: wrong_plausible
        linked_clues:
          - "Spent catalyst and filter residues are generated in small quantities."
        short_hint: "Even small quantities of hazardous solid waste require a confirmed disposal route in the design basis."

    correct_decision_ids:
      - voc_recovery_or_destruction_on_all_vents
      - define_all_wastewater_streams_by_source
      - ph_neutralization_before_discharge
      - secondary_containment_all_chemical_storage
      - quantified_emission_estimates_for_permit
      - fugitive_emission_monitoring_program
      - recover_organic_vapor_before_destruction
      - define_disposal_route_for_solid_waste

    wrong_but_plausible_decision_ids:
      - full_biological_ww_treatment_no_data
      - open_flame_flare_for_voc_control
      - fugitive_emissions_negligible_no_basis
      - skip_secondary_containment_for_feed_b_aqueous
      - discharge_wastewater_after_neutralization_only
      - env_compliance_as_paperwork_only
      - ignore_solid_waste_negligible

    scoring:
      mode: deterministic_easy
      pass_threshold_percent: 70
      perfect_threshold_percent: 100
      points:
        correct_selection: 1
        missed_correct: -0.5
        incorrect_selection: -0.25
        perfect_bonus: 1
      result_bands:
        - id: excellent
          min_percent: 90
          title: "Environmental basis complete"
          message: "You identified all emission sources, applied the recover-before-destroy hierarchy, and correctly deferred treatment design until waste characterisation data is available."
        - id: pass
          min_percent: 70
          title: "Acceptable first review"
          message: "You identified the main environmental requirements, but some emission sources or control measures were missed. Review the feedback before moving on."
        - id: retry
          min_percent: 0
          title: "Needs revision"
          message: "The environmental design basis is not yet defensible. Re-read all emission source and wastewater sections and ensure every regulated stream has an identified control measure."

    senior_engineer_explanations:
      correct:
        voc_recovery_or_destruction_on_all_vents: >
          Correct. Every vent point handling organic vapors — reactor, separation overheads,
          storage tanks — is a potential regulated VOC emission source. VOC control is explicitly
          required in the design basis and must be addressed for each source.
        define_all_wastewater_streams_by_source: >
          Correct. Different wastewater streams carry different contaminants: the aqueous
          separator stream carries catalyst residues and trace organics, wash water carries
          trace process materials, and catalyst bleed is high-concentration catalyst.
          Each stream needs to be characterised before any treatment system can be designed.
        ph_neutralization_before_discharge: >
          Correct. Neutralization before discharge is explicitly stated in the design basis.
          The catalyst solution is corrosive, so the aqueous phase leaving the process is
          likely acidic or basic and must be brought to an acceptable pH range.
        secondary_containment_all_chemical_storage: >
          Correct. Secondary containment prevents both a safety incident (flammable Feed A
          spread to an ignition source) and an environmental incident (corrosive or contaminated
          liquid reaching soil or drainage). It is required for all liquid chemical storage.
        quantified_emission_estimates_for_permit: >
          Correct. Environmental regulators require numbers in permit applications, not just
          a list of control technologies. Identifying the obligation to quantify emissions at
          the design-basis stage ensures that emission data is collected as part of the design
          process rather than scrambled for at permit submission time.
        fugitive_emission_monitoring_program: >
          Correct. Flanges, valve stems, pump seals, and other equipment in organic service
          emit small but aggregated quantities of organic vapor. These fugitive emissions are
          a regulated VOC source and require a monitoring programme under most jurisdictions.
        recover_organic_vapor_before_destruction: >
          Correct. The waste minimisation hierarchy puts recovery and reuse above treatment
          and disposal. Recovering organic vapors from separation and storage vents for
          recycle recovers feedstock value and reduces the load on any downstream VOC
          destruction device.
        define_disposal_route_for_solid_waste: >
          Correct. Catalyst residues and filter solids, even in small quantities, may be
          classified as hazardous waste requiring specific handling, transport, and disposal.
          The disposal route must be confirmed in the design basis before the plant is built,
          not after it is operating.
      incorrect:
        full_biological_ww_treatment_no_data: >
          Not justified. Biological treatment requires knowledge of biodegradable organic
          loading, inhibitory substances, and minimum temperature for effective treatment.
          None of this data appears in the current design basis. Specifying a full biological
          treatment plant now is premature.
        open_flame_flare_for_voc_control: >
          Not justified. Open-flame flaring is appropriate for large petrochemical plants with
          high hydrocarbon flow rates. For a small specialty chemical plant, a flare creates
          ignition risk near flammable feed areas and is likely over-engineered relative to
          the VOC volumes involved.
        fugitive_emissions_negligible_no_basis: >
          Not justified. A regulatory permit application for a plant handling organic materials
          requires fugitive emission estimates. Declaring them negligible without measurement
          or calculation data is not a defensible position with regulators.
        skip_secondary_containment_for_feed_b_aqueous: >
          Incorrect. Aqueous classification does not mean the stream is environmentally benign.
          Feed B is a corrosive catalyst solution at high concentration. A spill would damage
          infrastructure, harm personnel, and potentially contaminate drainage. Secondary
          containment is required.
        discharge_wastewater_after_neutralization_only: >
          Incorrect. Neutralization removes the pH problem but does nothing about dissolved
          organics, catalyst residues, or other contaminants that may have their own discharge
          limits. A final effluent quality checkpoint is needed to confirm that all permit
          parameters — not just pH — are met before discharge.
        env_compliance_as_paperwork_only: >
          Not justified. Environmental compliance is not a later paperwork exercise — it drives
          fundamental process design decisions including emission source identification, waste
          stream characterisation, and selection of control technologies. Deferring these to the
          permit application stage risks redesign costs and permitting delays.
        ignore_solid_waste_negligible: >
          Not justified. Small quantities of spent catalyst and filter residues do not exempt
          the plant from having a confirmed disposal route. These materials may be classified
          as hazardous waste requiring specific handling, transport, and disposal arrangements
          that must be established before the plant starts operating.
      missed:
        default: >
          Missed decision. This selection is directly supported by the emission sources,
          wastewater stream descriptions, or environmental scope in the design basis.
          Re-check those sections.

    review_summary_template:
      - "You selected {correct_selected_count} out of {total_correct_count} required environmental decisions."
      - "You missed {missed_count} required decisions."
      - "You selected {incorrect_selected_count} unsupported decisions."
      - "Final score: {score_percent}%."

    telemetry_events:
      - level_started
      - bod_opened
      - decision_card_selected
      - decision_card_deselected
      - level_submitted
      - feedback_viewed
      - level_passed
      - level_retried

