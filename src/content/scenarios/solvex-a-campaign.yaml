id: solvex_a_campaign
version: 0.1.0
title: "Solvex-A: Basis to Plant"
subtitle: "Design Basis Challenge"
player_role: "Junior process engineer"
plant:
  product: "Solvex-A"
  product_type: "Specialty solvent additive"
  plant_type: "Small continuous/batch hybrid chemical plant"
  annual_capacity_tpy: 5000

missions:
  - id: solvex_a_mission_1
    version: 0.1.0
    title: "Mission 1: Decode The Design Basis"
    short_title: "Decode The Design Basis"
    mission_number: 1
    difficulty: easy
    status: current
    industry: specialty_chemicals
    plant:
      product: "Solvex-A"
      product_type: "Specialty solvent additive"
      plant_type: "Small continuous/batch hybrid chemical plant"
      annual_capacity_tpy: 5000
    player_role: "Junior process engineer"
    stage:
      id: bod_review
      name: "Design Basis Review"
      gantt_position: 1
      unlocks_on_pass:
        - "Basic PFD Blocks"
        - "Mission 2: The Reactor Runs Hot"
    unlock:
      unlocks_on_pass:
        - "Basic PFD Blocks"
        - "Mission 2: The Reactor Runs Hot"
      next_mission_id: solvex_a_mission_2
      requires_score_percent: 70
      requires_perfect_score: false
    learning_goals:
      - "Read a simplified Basis of Design excerpt."
      - "Identify process constraints from feedstock, operating, environmental, and safety information."
      - "Select early process design decisions justified by the design basis."
      - "Avoid over-selecting decisions that are not yet supported by the document."

    briefing:
      senior_engineer_message: >
        You are reviewing the first Solvex-A design basis excerpt. Do not design the whole plant yet.
        Your task is to identify the early design decisions that are directly implied by the document.
        Select only decisions that can be justified from the current information.

    bod_excerpt:
      project_context:
        - "The project is a new Solvex-A specialty solvent additive unit."
        - "The target production capacity is 5,000 tons per year."
        - "The plant is expected to operate 330 days per year."
      feedstock_requirements:
        - "Feed A is a liquid organic feedstock."
        - "Feed A contains light impurity X."
        - "Feed A is flammable."
        - "Feed B is an aqueous catalyst solution."
        - "Feed B is corrosive at high concentration."
      product_targets:
        - "Final Solvex-A purity must be at least 98.5 wt%."
        - "Final product water content must be below 0.5 wt%."
      operating_constraints:
        - "The reaction is mildly exothermic."
        - "The maximum reactor temperature is 120 C."
        - "Medium-pressure steam is available."
        - "Cooling water is limited during summer operation."
      environmental_constraints:
        - "VOC emissions must be controlled."
        - "Wastewater must be neutralized before discharge."
      safety_constraints:
        - "Overpressure protection is required for the reactor section."
        - "Ignition sources around flammable feed handling should be controlled."

    instructions:
      prompt: >
        Select the design decisions that are directly implied by this design basis excerpt.
        Some options are technically possible but not justified yet.
      selection_rule: "Select all that apply."
      expected_time_minutes: 5

    categories:
      - id: reactor_system
        label: "Reactor System"
      - id: separation_system
        label: "Separation System"
      - id: heat_transfer_and_utilities
        label: "Heat Transfer & Utilities"
      - id: process_control_and_safety
        label: "Process Control & Safety"
      - id: environmental_treatment
        label: "Environmental Treatment"
      - id: unsupported_for_now
        label: "Not Justified Yet"

    decision_cards:
      - id: reactor_temperature_control_loop
        category: process_control_and_safety
        label: "Add reactor temperature control loop"
        type: correct
        linked_clues:
          - "The reaction is mildly exothermic."
          - "The maximum reactor temperature is 120 C."
        short_hint: "The reactor has both heat generation and a temperature limit."

      - id: reactor_heat_removal_system
        category: heat_transfer_and_utilities
        label: "Provide reactor heat removal system"
        type: correct
        linked_clues:
          - "The reaction is mildly exothermic."
          - "Cooling water is limited during summer operation."
        short_hint: "Exothermic systems need a defined heat-removal path."

      - id: high_temperature_alarm
        category: process_control_and_safety
        label: "Add high reactor temperature alarm"
        type: correct
        linked_clues:
          - "The maximum reactor temperature is 120 C."
          - "The reaction is mildly exothermic."
        short_hint: "A temperature limit needs operator warning before unsafe operation."

      - id: reactor_pressure_relief_valve
        category: process_control_and_safety
        label: "Include reactor pressure relief protection"
        type: correct
        linked_clues:
          - "Overpressure protection is required for the reactor section."
        short_hint: "This is explicitly required."

      - id: flammable_feed_vapor_control
        category: process_control_and_safety
        label: "Control vapors and ignition sources around Feed A"
        type: correct
        linked_clues:
          - "Feed A is flammable."
          - "Ignition sources around flammable feed handling should be controlled."
        short_hint: "Flammable liquid handling needs vapor and ignition control."

      - id: corrosion_resistant_feed_b_contact_parts
        category: reactor_system
        label: "Use corrosion-resistant materials for high-concentration Feed B contact parts"
        type: correct
        linked_clues:
          - "Feed B is corrosive at high concentration."
        short_hint: "Corrosive catalyst solution affects material selection."

      - id: light_impurity_removal_step
        category: separation_system
        label: "Include a light-impurity removal step"
        type: correct
        linked_clues:
          - "Feed A contains light impurity X."
          - "Final Solvex-A purity must be at least 98.5 wt%."
        short_hint: "Impurity X and purity target imply separation work."

      - id: product_drying_or_water_removal
        category: separation_system
        label: "Include product water-removal or drying step"
        type: correct
        linked_clues:
          - "Feed B is an aqueous catalyst solution."
          - "Final product water content must be below 0.5 wt%."
        short_hint: "Aqueous input plus low water target implies water removal."

      - id: wastewater_neutralization
        category: environmental_treatment
        label: "Add wastewater neutralization before discharge"
        type: correct
        linked_clues:
          - "Wastewater must be neutralized before discharge."
        short_hint: "This is explicitly required."

      - id: voc_emission_control
        category: environmental_treatment
        label: "Add VOC emission control"
        type: correct
        linked_clues:
          - "VOC emissions must be controlled."
          - "Feed A is a liquid organic feedstock."
        short_hint: "Organic feed handling can create VOC emissions."

      - id: full_plant_3d_model
        category: unsupported_for_now
        label: "Build a full 3D plant model"
        type: wrong_plausible
        linked_clues: []
        short_hint: "This may be useful later, but it is not required by this BoD review."

      - id: finite_element_analysis_reactor_shell
        category: unsupported_for_now
        label: "Run FEA on the reactor shell"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Mechanical verification is outside this early process decision level."

      - id: cryogenic_distillation_column
        category: separation_system
        label: "Select cryogenic distillation for impurity removal"
        type: wrong_plausible
        linked_clues:
          - "Feed A contains light impurity X."
        short_hint: "Separation is needed, but cryogenic service is not justified by the current data."

      - id: nuclear_grade_containment
        category: process_control_and_safety
        label: "Specify nuclear-grade containment"
        type: wrong_plausible
        linked_clues: []
        short_hint: "The plant is a specialty chemical unit, not a nuclear facility."

      - id: food_grade_sterile_design
        category: reactor_system
        label: "Use food-grade sterile equipment design"
        type: wrong_plausible
        linked_clues: []
        short_hint: "No food, pharma, or biological sterility requirement appears in the design basis."

      - id: maximize_reactor_temperature
        category: reactor_system
        label: "Operate close to the maximum reactor temperature to increase rate"
        type: wrong_plausible
        linked_clues:
          - "The maximum reactor temperature is 120 C."
        short_hint: "A maximum limit is a constraint, not a target."

      - id: ignore_summer_cooling_constraint
        category: heat_transfer_and_utilities
        label: "Use standard cooling water design and ignore summer limitation"
        type: wrong_plausible
        linked_clues:
          - "Cooling water is limited during summer operation."
        short_hint: "The design basis explicitly flags a cooling-water limitation."

    correct_decision_ids:
      - reactor_temperature_control_loop
      - reactor_heat_removal_system
      - high_temperature_alarm
      - reactor_pressure_relief_valve
      - flammable_feed_vapor_control
      - corrosion_resistant_feed_b_contact_parts
      - light_impurity_removal_step
      - product_drying_or_water_removal
      - wastewater_neutralization
      - voc_emission_control

    wrong_but_plausible_decision_ids:
      - full_plant_3d_model
      - finite_element_analysis_reactor_shell
      - cryogenic_distillation_column
      - nuclear_grade_containment
      - food_grade_sterile_design
      - maximize_reactor_temperature
      - ignore_summer_cooling_constraint

    scoring:
      mode: deterministic_easy
      pass_threshold_percent: 70
      perfect_threshold_percent: 100
      points:
        correct_selection: 1
        missed_correct: -0.5
        incorrect_selection: -0.25
        perfect_bonus: 1
      result_bands:
        - id: excellent
          min_percent: 90
          title: "Design review ready"
          message: "Your selections are well supported by the design basis. You identified the main process, safety, and environmental constraints."
        - id: pass
          min_percent: 70
          title: "Acceptable first review"
          message: "You caught the main design requirements, but some important constraints were missed or over-selected. Review the feedback before moving on."
        - id: retry
          min_percent: 0
          title: "Needs revision"
          message: "Your decision set is not yet defensible. Re-read the design basis and select only decisions that are directly supported."

    senior_engineer_explanations:
      correct:
        reactor_temperature_control_loop: >
          Correct. A mildly exothermic reaction with a maximum reactor temperature requires active temperature control.
          The goal is not only to reach the operating temperature, but to prevent temperature drift beyond the design limit.
        reactor_heat_removal_system: >
          Correct. The reaction releases heat, so the reactor section needs a heat-removal path.
          Because cooling water is limited in summer, the utility choice cannot be treated as a generic detail.
        high_temperature_alarm: >
          Correct. The 120 C limit should trigger operator awareness before the reactor approaches unsafe or off-spec operation.
          A control loop manages the variable; an alarm warns when the condition becomes abnormal.
        reactor_pressure_relief_valve: >
          Correct. The design basis explicitly requires overpressure protection for the reactor section.
          This is a safety requirement, not an optional optimization.
        flammable_feed_vapor_control: >
          Correct. Feed A is flammable, so vapor management and ignition-source control are required around storage and feed handling.
          This protects the process before the reaction step even begins.
        corrosion_resistant_feed_b_contact_parts: >
          Correct. Feed B is corrosive at high concentration, so material compatibility must be considered for the parts that contact it.
          This may affect vessels, piping, pumps, valves, gaskets, and dosing equipment.
        light_impurity_removal_step: >
          Correct. Feed A contains light impurity X and the product purity target is 98.5 wt%.
          The early process design should include a separation step capable of removing this impurity.
        product_drying_or_water_removal: >
          Correct. Feed B is aqueous, but the final product water content must be below 0.5 wt%.
          That means the process needs a water-removal or drying strategy.
        wastewater_neutralization: >
          Correct. The design basis states that wastewater must be neutralized before discharge.
          This requirement belongs in the environmental treatment section from the beginning.
        voc_emission_control: >
          Correct. VOC emissions must be controlled, and the process uses an organic feedstock.
          The design should include vapor containment, condensation, scrubbing, carbon treatment, or another justified VOC-control method later.
      incorrect:
        full_plant_3d_model: >
          Not justified. A 3D model may be useful in a later layout or construction stage, but this level is about early process design decisions.
          Do not add deliverables that the current design basis does not require.
        finite_element_analysis_reactor_shell: >
          Not justified. FEA belongs to later mechanical verification, not the first process design-basis review.
          The current task is to identify process, safety, utility, and environmental decisions.
        cryogenic_distillation_column: >
          Not justified. The design basis says there is a light impurity, so separation is needed, but it does not give boiling points, volatility, temperature limits, or economic reasons for cryogenic distillation.
          A generic impurity-removal step is defensible; cryogenic distillation is over-specific.
        nuclear_grade_containment: >
          Not justified. This is a small specialty chemical plant. Nothing in the design basis indicates radioactive materials or nuclear-grade containment requirements.
        food_grade_sterile_design: >
          Not justified. No food, pharma, biotech, or sterile-processing requirement appears in the document.
          This is an example of importing requirements from the wrong industry.
        maximize_reactor_temperature: >
          Incorrect. The maximum reactor temperature is a safety and design constraint, not an operating target.
          A higher reaction rate is not enough justification to operate near the limit.
        ignore_summer_cooling_constraint: >
          Incorrect. The cooling-water limit is explicitly stated. Ignoring it would create a weak design basis interpretation and may cause summer operating problems.
      missed:
        default: >
          Missed decision. This choice is directly supported by one or more design-basis clues.
          Re-check the feedstock, operating, environmental, and safety sections.

    review_summary_template:
      - "You selected {correct_selected_count} out of {total_correct_count} required decisions."
      - "You missed {missed_count} required decisions."
      - "You selected {incorrect_selected_count} unsupported decisions."
      - "Final score: {score_percent}%."

    telemetry_events:
      - level_started
      - bod_opened
      - decision_card_selected
      - decision_card_deselected
      - level_submitted
      - feedback_viewed
      - level_passed
      - level_retried

  - id: solvex_a_mission_2
    version: 0.1.0
    title: "Mission 2: The Reactor Runs Hot"
    short_title: "The Reactor Runs Hot"
    mission_number: 2
    difficulty: easy
    status: locked
    industry: specialty_chemicals
    plant:
      product: "Solvex-A"
      product_type: "Specialty solvent additive"
      plant_type: "Small continuous/batch hybrid chemical plant"
      annual_capacity_tpy: 5000
    player_role: "Junior process engineer"
    stage:
      id: reactor_section
      name: "Reaction Section"
      gantt_position: 2
      unlocks_on_pass:
        - "Separation Section Basics"
        - "Mission 3: Separation Planning"
    unlock:
      unlocks_on_pass:
        - "Separation Section Basics"
        - "Mission 3: Separation Planning"
      next_mission_id: solvex_a_mission_3
      requires_score_percent: 70
      requires_perfect_score: false
    learning_goals:
      - "Understand how exothermic reaction heat removal drives reactor section design."
      - "Distinguish between normal temperature control and independent safety protection."
      - "Recognise that a utility limitation (summer cooling water) constrains the entire reactor design."
      - "Select reactor-section design-basis decisions that are defensible at this stage."
      - "Avoid over-design and unjustified modelling at the early design-basis level."

    briefing:
      senior_engineer_message: >
        Now we dig into the reactor section. The Solvex-A reaction is exothermic and
        product quality is sensitive to reactor temperature. Cooling water is limited
        during summer — so the reactor heat-removal system cannot be treated as a
        generic detail. Your task: select the design-basis decisions that make the
        reactor section safe, operable, and defensible for this plant.

    bod_excerpt:
      project_context:
        - "The reactor section converts Feed A and Feed B into Solvex-A in a single liquid-phase exothermic reaction."
        - "The heat of reaction is approximately −150 kJ per mole of Solvex-A produced."
        - "Reactor operating temperature must stay between 80 C and 110 C for target product quality."
      reactor_requirements:
        - "Reaction selectivity to Solvex-A drops by 3 percentage points per 10 C above 110 C."
        - "Feed conversion at 80–110 C is 92 % to 96 % per pass."
        - "At 120 C, side-product formation doubles and an exothermic decomposition pathway becomes credible."
      cooling_utility_constraints:
        - "Cooling water supply temperature is 25 C in winter and 32 C in summer."
        - "Maximum cooling water return temperature is 45 C."
        - "Cooling water flow is limited to 50 m³/h during summer peak demand."
      safety_requirements:
        - "An exothermic runaway to above 140 C is a credible scenario if normal cooling is lost."
        - "Runaway can generate overpressure through vapour formation and gas generation from decomposition."
        - "Independent layers of protection shall be provided for the reactor temperature hazard."
      design_scope:
        - "This review covers the reactor-section design basis only."
        - "Full relief-system sizing, detailed piping design, and mechanical vessel design are outside scope at this stage."
        - "Advanced modelling (CFD, FEA, full 3D plant model) is not required now."

    instructions:
      prompt: >
        Select the reactor-section design-basis decisions that are justified by the
        information above. Some options describe good intentions but are not yet
        supported or are the wrong approach for this stage.
      selection_rule: "Select all that apply."
      expected_time_minutes: 6

    categories:
      - id: reactor_system
        label: "Reactor System"
      - id: heat_transfer_and_utilities
        label: "Heat Transfer & Utilities"
      - id: process_control_and_safety
        label: "Process Control & Safety"
      - id: unsupported_for_now
        label: "Not Justified Yet"

    decision_cards:
      - id: reactor_heat_removal_summer_duty
        category: heat_transfer_and_utilities
        label: "Provide reactor heat removal system sized for exotherm and summer cooling-water limit"
        type: correct
        linked_clues:
          - "The heat of reaction is approximately −150 kJ per mole."
          - "Cooling water flow is limited to 50 m³/h during summer."
          - "Cooling water supply temperature is 32 C in summer."
        short_hint: "Heat removal must be sized for the worst case, not the annual average."

      - id: reactor_temp_control_coolant_loop
        category: process_control_and_safety
        label: "Add reactor temperature control loop tied to coolant flow or jacket duty"
        type: correct
        linked_clues:
          - "Reactor operating temperature must stay between 80 C and 110 C."
          - "Selectivity drops above 110 C."
          - "The reaction is exothermic."
        short_hint: "Temperature-sensitive quality demands active control, not just monitoring."

      - id: independent_high_temp_interlock
        category: process_control_and_safety
        label: "Add independent high-high temperature interlock separate from normal control"
        type: correct
        linked_clues:
          - "An exothermic runaway to above 140 C is a credible scenario."
          - "Independent layers of protection shall be provided."
        short_hint: "A control loop manages normal operation; a separate interlock handles the hazard."

      - id: define_max_reactor_operating_temp
        category: reactor_system
        label: "Define maximum allowable reactor operating temperature in the design basis"
        type: correct
        linked_clues:
          - "Side-product formation doubles at 120 C."
          - "Decomposition pathway becomes credible at 120 C."
        short_hint: "A defined temperature limit is needed before any equipment can be specified."

      - id: flag_cw_summer_design_constraint
        category: heat_transfer_and_utilities
        label: "Flag cooling-water summer limitation as a reactor design constraint"
        type: correct
        linked_clues:
          - "Cooling water flow is limited to 50 m³/h during summer."
          - "Cooling water supply temperature is 32 C in summer."
        short_hint: "The worst-case utility condition drives the design, not the annual average."

      - id: relief_venting_review_runaway
        category: process_control_and_safety
        label: "Require relief and venting review for credible runaway and overpressure"
        type: correct
        linked_clues:
          - "Runaway can generate overpressure through vapour and gas generation."
          - "Independent layers of protection shall be provided."
        short_hint: "Acknowledging the runaway overpressure hazard is a design-basis requirement."

      - id: check_coolant_supply_before_increase
        category: heat_transfer_and_utilities
        label: "Increase coolant flow only after confirming supply temperature and utility-side capacity"
        type: correct
        linked_clues:
          - "Cooling water flow is limited to 50 m³/h during summer."
          - "Cooling water supply temperature varies between seasons."
        short_hint: "More flow helps only if the supply side can deliver it at the needed temperature."

      - id: verify_utility_bottleneck_before_hx
        category: heat_transfer_and_utilities
        label: "Add larger heat exchange area only after verifying the utility side is not the bottleneck"
        type: correct
        linked_clues:
          - "Cooling water flow is limited to 50 m³/h during summer."
          - "Maximum cooling water return temperature is 45 C."
        short_hint: "A utility limit caps total heat removal regardless of exchanger area."

      - id: feed_rate_reduction_operating_fallback
        category: reactor_system
        label: "Specify feed rate reduction as an operating fallback for hot summer days"
        type: correct
        linked_clues:
          - "The reaction is exothermic."
          - "Cooling water is limited during summer."
        short_hint: "An operating fallback is prudent, but design for normal rates first."

      - id: ignore_summer_cw_use_annual_avg
        category: heat_transfer_and_utilities
        label: "Ignore summer cooling-water limitation; use the annual average temperature"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Design for the worst credible case, not the statistical average."

      - id: operator_alarm_only_for_runaway
        category: process_control_and_safety
        label: "Rely only on an operator alarm for exothermic runaway protection"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Operator response alone is not a sufficient independent protection layer."

      - id: overdesign_reactor_volume_heat_removal
        category: reactor_system
        label: "Overdesign reactor volume as the primary heat-removal solution"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Reactor volume mainly affects holdup and conversion — not heat transfer area."

      - id: exotic_metallurgy_no_corrosion_evidence
        category: reactor_system
        label: "Use expensive exotic metallurgy without evidence of corrosion or material incompatibility"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Material upgrades need a corrosion or compatibility justification from the design basis."

      - id: full_cfd_fea_3d_reactor_modeling
        category: unsupported_for_now
        label: "Run full CFD, FEA, and 3D modelling for the reactor at this stage"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Advanced modelling belongs to later detailed engineering, not the early design basis."

      - id: same_control_safety_protection_layer
        category: process_control_and_safety
        label: "Treat the reactor temperature controller and safety trip as the same protection layer"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Independent layers of protection are a fundamental process-safety concept."

    correct_decision_ids:
      - reactor_heat_removal_summer_duty
      - reactor_temp_control_coolant_loop
      - independent_high_temp_interlock
      - define_max_reactor_operating_temp
      - flag_cw_summer_design_constraint
      - relief_venting_review_runaway
      - check_coolant_supply_before_increase
      - verify_utility_bottleneck_before_hx
      - feed_rate_reduction_operating_fallback

    wrong_but_plausible_decision_ids:
      - ignore_summer_cw_use_annual_avg
      - operator_alarm_only_for_runaway
      - overdesign_reactor_volume_heat_removal
      - exotic_metallurgy_no_corrosion_evidence
      - full_cfd_fea_3d_reactor_modeling
      - same_control_safety_protection_layer

    scoring:
      mode: deterministic_easy
      pass_threshold_percent: 70
      perfect_threshold_percent: 100
      points:
        correct_selection: 1
        missed_correct: -0.5
        incorrect_selection: -0.25
        perfect_bonus: 1
      result_bands:
        - id: excellent
          min_percent: 90
          title: "Design review ready"
          message: "You identified the key reactor heat-removal, control, and safety decisions. The reactor section basis is sound."
        - id: pass
          min_percent: 70
          title: "Acceptable first review"
          message: "You caught the main reactor requirements, but some heat-removal or safety decisions were missed or over-selected. Review the feedback before moving on."
        - id: retry
          min_percent: 0
          title: "Needs revision"
          message: "Your reactor-section decision set is not yet defensible. Re-read the design basis and select only decisions directly supported by the reactor information."

    senior_engineer_explanations:
      correct:
        reactor_heat_removal_summer_duty: >
          Correct. The reactor generates heat and cooling water is limited in summer.
          A heat-removal system sized only for average conditions will fail when it matters most.
          The summer cooling-water supply temperature and flow limit must be part of the sizing basis.
        reactor_temp_control_coolant_loop: >
          Correct. Product selectivity is temperature-sensitive and the reaction is exothermic.
          A temperature control loop — modulating coolant flow or jacket duty — is the primary
          means of maintaining reactor temperature within the 80–110 C window.
        independent_high_temp_interlock: >
          Correct. The design basis identifies a credible runaway to above 140 C.
          A normal temperature controller is not a safety function. An independent high-high
          temperature interlock provides a separate layer of protection that does not rely on
          the same sensor, logic solver, or final element.
        define_max_reactor_operating_temp: >
          Correct. Side-product formation doubles and decomposition becomes credible at 120 C.
          The design basis must state the maximum allowable operating temperature so that all
          downstream equipment, control, and safety decisions reference a single limit.
        flag_cw_summer_design_constraint: >
          Correct. Cooling-water flow is capped at 50 m³/h in summer and supply temperature rises
          to 32 C. If the reactor heat-removal design ignores this constraint, the plant may not
          achieve rated capacity during the hottest months.
        relief_venting_review_runaway: >
          Correct. The runaway scenario can generate overpressure. At this stage you are not being
          asked to size the relief system — only to recognise that it must be reviewed as part of
          the reactor-section design basis. That is the right scope decision.
        check_coolant_supply_before_increase: >
          Correct. Increasing coolant flow is only effective if the supply can deliver the additional
          flow at a low enough temperature. Checking supply temperature and utility-side head and
          flow limits first is sound engineering practice.
        verify_utility_bottleneck_before_hx: >
          Correct. More heat exchanger area cannot remove extra heat if the cooling water is already
          at its maximum return temperature or flow limit. Always check for the limiting step before
          adding equipment.
        feed_rate_reduction_operating_fallback: >
          Correct. On extremely hot days, reducing feed rate is a legitimate operating fallback to
          keep the reactor within temperature limits. However, it should be a temporary contingency,
          not the primary design-basis solution. The plant should be designed for target rates.
      incorrect:
        ignore_summer_cw_use_annual_avg: >
          Incorrect. Process plants are designed for the worst credible case, not the annual average.
          If the reactor cannot reject heat on a 32 C summer day, it cannot meet nameplate capacity
          when it may be needed most. Always use the limiting condition.
        operator_alarm_only_for_runaway: >
          Not justified. Operator response to an alarm is too slow and unreliable to serve as the
          sole protection layer for a credible exothermic runaway. An independent automatic
          interlock or trip is needed.
        overdesign_reactor_volume_heat_removal: >
          Incorrect. A larger reactor vessel increases holdup and residence time, not heat-transfer
          area. Heat removal is governed by jacket/coil area, coolant flow, and temperature
          difference — not vessel volume. This is a common misconception.
        exotic_metallurgy_no_corrosion_evidence: >
          Not justified. Mission 1 already identified corrosion-resistant materials for Feed B
          contact parts, but nothing in the reactor-section design basis points to exotic alloys.
          Material selection must follow evidence of corrosion, not assumptions.
        full_cfd_fea_3d_reactor_modeling: >
          Not justified. CFD, FEA, and 3D models are valuable in later detailed engineering,
          but at the design-basis stage you need fundamental decisions about heat removal,
          control strategy, and safety layers — not meshes and boundary conditions.
        same_control_safety_protection_layer: >
          Incorrect. A basic process-safety principle is that control and safety must be
          independent layers. If the temperature controller fails, the same instrument cannot
          also be relied on to trip the reactor. Separate sensors, logic, and final elements
          are required for the safety function.
      missed:
        default: >
          Missed decision. This selection is directly supported by the reactor-section design basis.
          Re-check the reactor requirements, cooling-utility constraints, and safety sections.

    review_summary_template:
      - "You selected {correct_selected_count} out of {total_correct_count} required reactor decisions."
      - "You missed {missed_count} required decisions."
      - "You selected {incorrect_selected_count} unsupported decisions."
      - "Final score: {score_percent}%."

    telemetry_events:
      - level_started
      - bod_opened
      - decision_card_selected
      - decision_card_deselected
      - level_submitted
      - feedback_viewed
      - level_passed
      - level_retried
