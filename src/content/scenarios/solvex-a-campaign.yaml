      - "Recognise that summer cooling-water limitations constrain every cooler and condenser, not only the reactor."
      - "Identify heat recovery opportunities between hot and cold process streams."
      - "Avoid specifying premium utilities when lower-grade alternatives are already available and adequate."

    briefing:
      senior_engineer_message: >
        We have defined the reactor and the separation train. Now we need to account for all the
        heat the plant adds and removes, and confirm that the utilities available can actually
        deliver it. The summer cooling-water limitation is not just a reactor problem — it
        affects every cooler and condenser in the plant. Your task is to identify the utility
        and heat-transfer design decisions that belong in the design basis at this stage.

    instructions:
      prompt: >
        Select the heat-transfer and utilities design-basis decisions that are justified by the
        information above. Avoid specifying detailed equipment sizes or premium utilities where
        lower-grade options are already available and adequate.
      selection_rule: "Select all that apply."
      expected_time_minutes: 6

    categories:
      - id: heat_transfer_and_utilities
        label: "Heat Transfer & Utilities"
      - id: reactor_system
        label: "Reactor System"
      - id: separation_system
        label: "Separation System"
      - id: unsupported_for_now
        label: "Not Justified Yet"

    decision_cards:
      - id: list_all_heat_demands_across_plant
        category: heat_transfer_and_utilities
        label: "Enumerate all process heat demands across the full plant before sizing any utility system"
        type: correct
        linked_clues:
          - "The reactor generates heat requiring cooling."
          - "The separation train requires a reboiler and a condenser."
          - "The drying step requires low-grade heat."
        short_hint: "The utility system must cover all demands, not just the reactor."

      - id: match_lp_steam_to_reboiler_duty
        category: heat_transfer_and_utilities
        label: "Use low-pressure steam as the preferred heating medium for separation reboiler and drying duties below 150 C"
        type: correct
        linked_clues:
          - "Low-pressure steam is available and is the preferred heating medium for duties below 150 C."
          - "Solvex-A separation steps must operate below 130 C."
        short_hint: "LP steam covers the temperature range and is the preferred lower-cost option."

      - id: size_cw_against_summer_limit
        category: heat_transfer_and_utilities
        label: "Size all coolers and condensers using the summer cooling-water conditions as the governing case"
        type: correct
        linked_clues:
          - "Cooling water is limited to 50 m3/h during summer peak demand."
          - "Cooling water supply temperature is 32 C in summer."
          - "Maximum cooling water return temperature is 45 C."
        short_hint: "Summer conditions constrain every piece of cooling equipment across the plant."

      - id: assess_heat_recovery_effluent_to_feed
        category: heat_transfer_and_utilities
        label: "Assess heat recovery opportunity between hot reactor effluent and cold feed streams"
        type: correct
        linked_clues:
          - "The hot reactor effluent enters the separation section at elevated temperature."
          - "Cold feed streams enter the process at ambient temperature."
          - "Heat recovery has not been assessed yet."
        short_hint: "Using process heat to preheat feeds reduces steam demand and cooling load."

      - id: flag_summer_cw_constraint_for_all_cooling
        category: heat_transfer_and_utilities
        label: "Flag the summer cooling-water supply limit as a design constraint for all coolers and condensers, not only the reactor"
        type: correct
        linked_clues:
          - "Cooling water total supply is limited to 50 m3/h during summer peak demand."
        short_hint: "The total cooling water budget must cover every consumer, not just the biggest one."

      - id: confirm_lp_steam_temp_adequate_for_reboiler
        category: heat_transfer_and_utilities
        label: "Confirm that low-pressure steam saturation temperature is adequate for all reboiler and heater duties before specifying steam supply pressure"
        type: correct
        linked_clues:
          - "Low-pressure steam is available and preferred for duties below 150 C."
          - "All separation steps must operate below 130 C."
        short_hint: "Steam pressure sets saturation temperature; check it matches the process duty before committing."

      - id: include_utility_balance_in_design_basis
        category: heat_transfer_and_utilities
        label: "Include a utility balance summary covering steam, cooling water, and electricity in the design basis before heat exchanger sizing begins"
        type: correct
        linked_clues:
          - "Utility balance calculations are outside scope at this stage, but demands must be identified."
        short_hint: "Identifying all demands now prevents surprise utility shortfalls in detailed design."

      - id: account_for_heat_tracing_needs
        category: heat_transfer_and_utilities
        label: "Account for heat tracing requirements for lines carrying high-viscosity or high-freezing-point materials"
        type: correct
        linked_clues:
          - "Feed A is a liquid organic feedstock."
          - "Feed B is an aqueous catalyst solution."
        short_hint: "Organic and aqueous lines may need tracing to remain pumpable in cold ambient conditions."

      - id: fired_heater_for_reboiler_no_justification
        category: unsupported_for_now
        label: "Install a direct-fired heater for the separation reboiler"
        type: wrong_plausible
        linked_clues: []
        short_hint: "A fired heater is justified only when steam temperature is insufficient — LP steam covers the separation duty here."

      - id: refrigeration_for_condensers_no_data
        category: unsupported_for_now
        label: "Specify refrigeration for overhead condensers because cooling water may not be cold enough"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Refrigeration requires evidence that cooling water temperature is inadequate. No such evidence appears in this design basis."

      - id: design_coolers_on_winter_cw_only
        category: heat_transfer_and_utilities
        label: "Design all coolers using winter cooling water temperature only"
        type: wrong_plausible
        linked_clues:
          - "Cooling water supply temperature is 25 C in winter and 32 C in summer."
        short_hint: "Summer is the governing case for cooling equipment — winter is the best case, not the design case."

      - id: skip_heat_recovery_plant_too_small
        category: heat_transfer_and_utilities
        label: "Assume heat recovery is not worthwhile at this plant scale without any calculation"
        type: wrong_plausible
        linked_clues:
          - "The hot reactor effluent enters the separation section at elevated temperature."
        short_hint: "Heat recovery potential must be assessed, not assumed away based on plant size."

      - id: size_steam_on_reactor_only
        category: heat_transfer_and_utilities
        label: "Size the steam supply based on reactor heating needs only, ignoring the separation train and drying step"
        type: wrong_plausible
        linked_clues:
          - "The separation train requires a reboiler."
          - "The drying step requires low-grade heat input."
        short_hint: "The steam supply must cover all heating consumers across the plant, not just the reactor."

      - id: mp_steam_for_all_heating
        category: heat_transfer_and_utilities
        label: "Use medium-pressure steam for all process heating duties because it offers the highest temperature driving force"
        type: wrong_plausible
        linked_clues:
          - "Low-pressure steam is also available and is the preferred heating medium for duties below 150 C."
          - "All separation steps must operate below 130 C."
        short_hint: "MP steam is available but LP steam is preferred for duties below 150 C — higher pressure adds cost without benefit."

      - id: design_coolers_independently_ignore_total_cw_budget
        category: heat_transfer_and_utilities
        label: "Size each cooler independently based on its individual duty without checking the total plant cooling water budget"
        type: wrong_plausible
        linked_clues:
          - "Cooling water total supply is limited to 50 m3/h during summer peak demand."
        short_hint: "The 50 m³/h limit is a total budget shared by all cooling consumers — each cooler competes for the same resource."

    correct_decision_ids:
      - list_all_heat_demands_across_plant
      - match_lp_steam_to_reboiler_duty
      - size_cw_against_summer_limit
      - assess_heat_recovery_effluent_to_feed
      - flag_summer_cw_constraint_for_all_cooling
      - confirm_lp_steam_temp_adequate_for_reboiler
      - include_utility_balance_in_design_basis
      - account_for_heat_tracing_needs

    wrong_but_plausible_decision_ids:
      - fired_heater_for_reboiler_no_justification
      - refrigeration_for_condensers_no_data
      - design_coolers_on_winter_cw_only
      - skip_heat_recovery_plant_too_small
      - size_steam_on_reactor_only
      - mp_steam_for_all_heating
      - design_coolers_independently_ignore_total_cw_budget

    scoring:
      mode: deterministic_easy
      pass_threshold_percent: 70
      perfect_threshold_percent: 100
      points:
        correct_selection: 1
        missed_correct: -0.5
        incorrect_selection: -0.25
        perfect_bonus: 1
      result_bands:
        - id: excellent
          min_percent: 90
          title: "Utility basis well defined"
          message: "You identified all major heat demands, matched the available utilities to the process needs, and correctly flagged the summer cooling-water limit as the governing constraint across the full plant."
        - id: pass
          min_percent: 70
          title: "Acceptable first review"
          message: "You caught the main utility requirements, but some demands were missed or the wrong utility was specified. Review the feedback before moving on."
        - id: retry
          min_percent: 0
          title: "Needs revision"
          message: "The heat and utility basis is not yet defensible. Re-read all heat demand and utility supply sections and ensure the summer case governs your cooling decisions."

    senior_engineer_explanations:
      correct:
        list_all_heat_demands_across_plant: >
          Correct. The utility system must supply or remove heat for every consumer in the plant.
          Missing even one demand at the design-basis stage can leave the utility supply undersized
          and require expensive retrofits later.
        match_lp_steam_to_reboiler_duty: >
          Correct. LP steam is available, preferred, and its saturation temperature covers the
          separation reboiler and drying duties that must stay below 130 C. Specifying a higher-
          grade utility without need adds cost without benefit.
        size_cw_against_summer_limit: >
          Correct. The summer cooling-water supply is the binding constraint for all cooling
          equipment across the plant. A condenser or cooler sized on winter conditions will
          underperform in summer regardless of how well the reactor cooling is designed.
        assess_heat_recovery_effluent_to_feed: >
          Correct. A hot reactor effluent stream and cold feed streams arriving at ambient
          temperature is a classic heat recovery opportunity. Assessing this now reduces
          steam demand and cooling load and may change equipment sizing significantly.
        flag_summer_cw_constraint_for_all_cooling: >
          Correct. The 50 m3/h summer limit is a plant-wide budget shared across the reactor
          cooler, separation condensers, and any other cooling consumers. Every cooling duty
          competes for the same limited resource.
        confirm_lp_steam_temp_adequate_for_reboiler: >
          Correct. LP steam saturation temperature depends on supply pressure. Confirming it
          is above the required reboiler temperature before committing to LP steam prevents
          a situation where the specified utility cannot actually deliver the required duty.
        include_utility_balance_in_design_basis: >
          Correct. Identifying all steam, cooling water, and electrical demands now allows
          the utility system to be scoped correctly before detailed equipment design begins.
          A utility balance is a standard design-basis deliverable.
        account_for_heat_tracing_needs: >
          Correct. Liquid organics and aqueous catalyst solutions may become viscous or
          freeze in cold ambient conditions if lines are not heat-traced. This is a utility
          demand that should be acknowledged in the design basis even before tracing design.
      incorrect:
        fired_heater_for_reboiler_no_justification: >
          Not justified. A fired heater is appropriate when steam temperature is genuinely
          insufficient for the required duty. LP steam covers the separation temperature
          range here. Adding a fired heater without a temperature-gap justification introduces
          unnecessary capital cost and safety complexity.
        refrigeration_for_condensers_no_data: >
          Not justified. Refrigeration is appropriate when cooling water temperature is
          too high to achieve the required condensing temperature. No data in this design
          basis shows that 32 C summer cooling water is inadequate for the condenser duty.
          This cannot be specified without evidence.
        design_coolers_on_winter_cw_only: >
          Incorrect. Winter conditions are the best case for cooling, not the design case.
          A cooler or condenser sized on 25 C winter supply will be undersized when 32 C
          summer supply arrives, exactly when cooling demand may be at its highest.
        skip_heat_recovery_plant_too_small: >
          Not justified. Heat recovery potential depends on stream temperatures, duties, and
          capital cost of exchangers — not on plant size as a rule of thumb. This must be
          assessed before it can be dismissed.
        size_steam_on_reactor_only: >
          Incorrect. The separation reboiler and drying step are both steam consumers. A
          steam supply scoped only for the reactor may be significantly undersized for the
          full plant, creating an infrastructure gap that is expensive to correct later.
        mp_steam_for_all_heating: >
          Not justified. Medium-pressure steam is available but LP steam is explicitly
          designated as the preferred medium for duties below 150 C. Using MP steam
          where LP suffices adds steam-system capital cost and wastes exergy without
          any process benefit. Match the utility grade to the duty, not the availability.
        design_coolers_independently_ignore_total_cw_budget: >
          Incorrect. The 50 m³/h summer cooling water limit is a total plant budget.
          If each cooler is sized independently, the summed demand may exceed the
          available supply, and the plant will trip or throttle on hot days. The total
          must be checked against the budget before any individual cooler design is approved.
      missed:
        default: >
          Missed decision. This selection is directly supported by the utility supply data or
          the plant heat demands described in the design basis. Re-check those sections.

    review_summary_template:
      - "You selected {correct_selected_count} out of {total_correct_count} required utility decisions."
      - "You missed {missed_count} required decisions."
      - "You selected {incorrect_selected_count} unsupported decisions."
      - "Final score: {score_percent}%."

    telemetry_events:
      - level_started
      - bod_opened
      - decision_card_selected
      - decision_card_deselected
      - level_submitted
      - feedback_viewed
      - level_passed
      - level_retried

  - id: solvex_a_mission_5
    version: 0.1.0
    title: "Mission 5: Layers of Protection"
    short_title: "Layers of Protection"
    mission_number: 5
    difficulty: easy
    status: locked
    industry: specialty_chemicals
    plant:
      product: "Solvex-A"
      product_type: "Specialty solvent additive"
      plant_type: "Small continuous/batch hybrid chemical plant"
      annual_capacity_tpy: 5000
    player_role: "Junior process engineer"
    stage:
      id: safety_systems
      name: "Safety Systems"
      gantt_position: 5
      unlocks_on_pass:
