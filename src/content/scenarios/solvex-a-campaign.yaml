    senior_engineer_explanations:
      correct:
        all_major_process_units_as_labeled_blocks: >
          Correct. Every confirmed process section must appear on the PFD as a labeled block.
          Omitting any section creates a gap in the process narrative and misleads anyone
          using the PFD as a reference.
        all_main_streams_with_flow_direction: >
          Correct. Streams without flow direction arrows are ambiguous. The PFD must show
          how material moves through the process from feed to product and from the process
          to environmental and utility destinations.
        utility_connections_at_each_major_unit: >
          Correct. Utility connections — steam, cooling water — at each process unit make
          the PFD a complete energy and mass flow reference. They are needed to communicate
          the utility balance and to drive later detailed design.
        recycle_stream_on_pfd: >
          Correct. The recycle of unreacted Feed A is a defining feature of the process
          material balance. It affects feed rates, reactor sizing, and separation loading.
          A PFD without the recycle stream is missing a major process feature.
        wastewater_and_vent_routing_on_pfd: >
          Correct. Environmental streams are part of the process and must be shown connecting
          the treatment units to their sources. A PFD that omits wastewater and vent routing
          gives an incomplete picture of the process to engineers, clients, and regulators.
        numbered_streams_for_stream_table: >
          Correct. Stream numbers are the link between the flow diagram and the stream table.
          Without numbering, the stream table cannot be referenced and the PFD loses its
          quantitative value.
        stream_table_with_key_properties: >
          Correct. The stream table elevates the PFD from a sketch to an engineering document.
          Temperature, pressure, phase, and flow rate data at each stream make it useful for
          sizing, checking balances, and communicating the process to others.
        feed_entry_and_product_exit_labeled: >
          Correct. Battery-limit streams define the interface between the plant and the outside
          world. They must be clearly labeled so that the plant boundary and tie-in points are
          unambiguous.
        heat_recovery_exchangers_on_pfd: >
          Correct. Heat recovery exchangers affect stream temperatures and energy consumption.
          They are major process units that belong on the PFD to communicate the heat
          integration concept.
      incorrect:
        control_valve_symbols_on_pfd: >
          Incorrect. Control valve symbols, instrument bubbles, and ISA-notation details belong
          on the P&ID. The PFD shows process function; the P&ID shows the instrumentation and
          control that implement it.
        pipe_sizes_on_pfd: >
          Incorrect. Pipe sizes and material specifications belong on the P&ID and the line list.
          Adding them to the PFD clutters the drawing and is not standard practice.
        every_drain_and_vent_on_pfd: >
          Incorrect. Individual drain, vent, and purge connections are P&ID level detail.
          Including every minor connection makes the PFD unreadable and defeats its purpose
          as a process concept document.
        relief_valve_symbols_on_pfd_vessels: >
          Incorrect. Relief device location, type, and discharge routing are P&ID level
          decisions made after the hazard study. The PFD acknowledges overpressure protection
          is required but does not specify individual relief devices.
        full_mechanical_equipment_list_on_pfd: >
          Incorrect. Mechanical specifications belong in the equipment list, which is a separate
          document. Integrating it into the PFD drawing is not standard practice and overloads
          the drawing.
        omit_env_and_utility_streams_for_simplicity: >
          Incorrect. A PFD that omits environmental treatment streams and utility connections
          is incomplete. It gives a false impression that the process has no environmental
          outputs and no utility requirements.
        three_d_plant_layout_on_pfd: >
          Incorrect. The PFD shows process concept and stream conditions, not physical
          equipment dimensions or 3D routing. Plant layout, structural steel, and equipment
          dimensions are separate deliverables produced during detailed engineering. Including
          them on the PFD misrepresents the document's purpose and overloads the drawing.
      missed:
        default: >
          Missed decision. This item is a standard required element of a conceptual Process
          Flow Diagram, as described in the PFD purpose and confirmed process sections.
          Re-check those sections.

    review_summary_template:
      - "You selected {correct_selected_count} out of {total_correct_count} required PFD elements."
      - "You missed {missed_count} required elements."
      - "You selected {incorrect_selected_count} elements that do not belong on a PFD."
      - "Final score: {score_percent}%."

    telemetry_events:
      - level_started
      - bod_opened
      - decision_card_selected
      - decision_card_deselected
      - level_submitted
      - feedback_viewed
      - level_passed
      - level_retried

  - id: solvex_a_mission_8
    version: 0.1.0
    title: "Mission 8: Tag Everything"
    short_title: "Tag Everything"
    mission_number: 8
    difficulty: easy
    status: locked
    industry: specialty_chemicals
    plant:
      product: "Solvex-A"
      product_type: "Specialty solvent additive"
      plant_type: "Small continuous/batch hybrid chemical plant"
      annual_capacity_tpy: 5000
    player_role: "Junior process engineer"
    stage:
      id: pid_basics
      name: "P&ID Basics"
      gantt_position: 8
      unlocks_on_pass:
        - "Campaign Complete"
    unlock:
      unlocks_on_pass:
        - "Campaign Complete"
      next_mission_id: null
      requires_score_percent: 70
      requires_perfect_score: false
    learning_goals:
      - "Understand what a P&ID adds to the PFD and why both documents are needed."
      - "Identify the instrumentation and control elements that must appear on a P&ID."
      - "Recognise that safety instrumented functions must be shown independently from the basic process control system."
      - "Identify isolation and protection hardware — block valves, check valves, relief valves — that belongs on the P&ID."
      - "Avoid placing mechanical, electrical, or vendor detail that does not belong on a P&ID."

    briefing:
      senior_engineer_message: >
        The PFD is approved. Now we move to the P&ID — the document that tells every engineer,
        operator, and maintenance technician exactly what is installed and how it is controlled.
        The P&ID does not replace the PFD; it adds a layer of detail that the PFD deliberately
        omits. Your final task is to identify what the Solvex-A P&ID must add, and what does
        not belong on a P&ID.

    instructions:
      prompt: >
        The Solvex-A PFD is complete. Select the items that the P&ID must add that the PFD does
        not show. Also identify items that do not belong on a P&ID.
      selection_rule: "Select all that apply."
      expected_time_minutes: 7

    categories:
      - id: process_control_and_safety
        label: "Instrumentation & Control"
      - id: reactor_system
        label: "Safety & Isolation Hardware"
      - id: separation_system
        label: "Pipe Specification"
      - id: unsupported_for_now
        label: "Not on a P&ID"

    decision_cards:
      - id: all_instruments_in_isa_notation
        category: process_control_and_safety
        label: "Show all instruments using ISA notation: temperature, pressure, flow, and level indicators and their controllers"
        type: correct
        linked_clues:
          - "The P&ID shows all instrumentation using ISA notation."
          - "Feed flow, reactor pressure, and separator level require measurement and control."
        short_hint: "Every measurement and control device must appear with the correct ISA symbol."

      - id: all_control_loops_fully_shown
        category: process_control_and_safety
        label: "Show all control loops with measurement point, controller block, and final control element"
        type: correct
        linked_clues:
          - "The P&ID shows all control loops with measurement points, controller blocks, and final control elements."
          - "The reactor temperature control loop must appear with its coolant flow control valve."
        short_hint: "A control loop is incomplete on a P&ID without all three elements shown."

      - id: independent_high_high_temp_interlock_shown_separately
        category: process_control_and_safety
        label: "Show the reactor high-high temperature interlock as a separate safety instrumented function, independent from the temperature control loop"
        type: correct
        linked_clues:
          - "The independent high-high temperature interlock must be shown separately from the temperature control loop."
          - "Safety instrumented functions must be independent of the basic process control system."
        short_hint: "Control and safety must appear as separate systems on the P&ID."

      - id: manual_block_valves_on_major_lines
        category: reactor_system
        label: "Show manual block valves on all major process lines for maintenance isolation"
        type: correct
        linked_clues:
          - "Manual block valves are required on all major process lines for maintenance isolation."
        short_hint: "Block valves make equipment isolatable for safe maintenance."

      - id: check_valves_on_feed_and_product_lines
        category: reactor_system
        label: "Show check valves on feed and product lines to prevent backflow"
        type: correct
        linked_clues:
          - "Check valves are required on feed and product lines to prevent backflow."
        short_hint: "Backflow can contaminate feeds, damage equipment, or create hazards."

      - id: pipe_spec_breaks_on_pid
        category: separation_system
        label: "Show pipe specification breaks on the P&ID where material or pressure rating changes along a line"
        type: correct
        linked_clues:
          - "The P&ID shows pipe specification breaks indicating where materials or pressure ratings change."
        short_hint: "Spec breaks tell fabricators and operators exactly where one pipe class ends and another begins."

      - id: reactor_relief_valve_with_discharge_routing
        category: reactor_system
        label: "Show the reactor pressure relief valve with its discharge line routed to the safe disposal system"
        type: correct
        linked_clues:
          - "The reactor pressure relief valve must be shown with its discharge line routed to the safe disposal system."
        short_hint: "The relief valve and its discharge route are both safety-critical and must both appear."

      - id: sample_points_on_product_and_key_streams
        category: process_control_and_safety
        label: "Show sample point connections on the product stream and key intermediate streams"
        type: correct
        linked_clues:
          - "Sample points are required on product and key intermediate streams."
        short_hint: "Sample points are a P&ID hardware item needed for quality checks and troubleshooting."

      - id: esd_connections_to_final_elements
        category: process_control_and_safety
        label: "Show ESD system connections to final control elements and isolation valves across the P&ID"
        type: correct
        linked_clues:
          - "The plant emergency shutdown system connects to isolation valves and final control elements."
        short_hint: "ESD actions must be traceable on the P&ID from logic to each valve it operates."

      - id: three_d_pipe_routing_on_pid
        category: unsupported_for_now
        label: "Show 3D pipe routing and isometric details on the P&ID"
        type: wrong_plausible
        linked_clues: []
        short_hint: "3D routing belongs on isometric drawings, not the P&ID."

      - id: structural_civil_details_on_pid
        category: unsupported_for_now
        label: "Show structural steelwork, civil foundations, and architectural elements on the P&ID"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Structural and civil details are produced on civil and structural drawings."

      - id: vendor_internal_details_on_pid
        category: unsupported_for_now
        label: "Show vendor internal details such as tray layouts, tube bundle arrangements, and packing specifications on the P&ID"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Vendor internal details appear on vendor drawings, not the P&ID."

      - id: electrical_wiring_on_pid
        category: unsupported_for_now
        label: "Replace instrument symbols with full electrical wiring schematics on the P&ID"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Electrical wiring and loop diagrams are produced as separate documents."

      - id: utility_header_full_detail_on_process_pid
        category: unsupported_for_now
        label: "Show the complete utility header design and distribution system in full detail on the process P&ID"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Utility systems are normally shown on separate utility P&IDs."

      - id: require_fea_before_package_approval
        category: unsupported_for_now
        label: "Require finite element analysis of the reactor vessel before the design package can be approved"
        type: wrong_plausible
        linked_clues: []
        short_hint: "FEA is detailed mechanical design, not a prerequisite for process package approval."

      - id: approve_package_despite_open_data_gaps
        category: unsupported_for_now
        label: "Approve the design package without documenting open data gaps from prior missions"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Open data gaps must be documented as open items in the package handover."

    correct_decision_ids:
      - all_instruments_in_isa_notation
      - all_control_loops_fully_shown
      - independent_high_high_temp_interlock_shown_separately
      - manual_block_valves_on_major_lines
      - check_valves_on_feed_and_product_lines
      - pipe_spec_breaks_on_pid
      - reactor_relief_valve_with_discharge_routing
      - sample_points_on_product_and_key_streams
      - esd_connections_to_final_elements

    wrong_but_plausible_decision_ids:
      - three_d_pipe_routing_on_pid
      - structural_civil_details_on_pid
      - vendor_internal_details_on_pid
      - electrical_wiring_on_pid
      - utility_header_full_detail_on_process_pid
      - require_fea_before_package_approval
      - approve_package_despite_open_data_gaps

    scoring:
      mode: deterministic_easy
      pass_threshold_percent: 70
      perfect_threshold_percent: 100
      points:
        correct_selection: 1
        missed_correct: -0.5
        incorrect_selection: -0.25
        perfect_bonus: 1
      result_bands:
        - id: excellent
          min_percent: 90
          title: "P&ID scope complete"
          message: "You correctly identified all P&ID additions, kept safety instrumented functions independent from control, and cleanly separated P&ID content from other engineering documents. Solvex-A campaign complete."
        - id: pass
          min_percent: 70
          title: "Acceptable first review"
          message: "You identified the main P&ID requirements, but some instrumentation, hardware, or scope boundaries were missed. Review the feedback to consolidate your understanding."
        - id: retry
          min_percent: 0
          title: "Needs revision"
          message: "The P&ID scope is not yet correctly defined. Re-read the P&ID versus PFD section, control and safety requirements, and scope exclusions, then try again."

    senior_engineer_explanations:
      correct:
        all_instruments_in_isa_notation: >
          Correct. The P&ID is the definitive instrument reference document for the plant.
          Every measurement device, indicator, transmitter, and controller must be shown
          using standardised ISA symbols so that any engineer or instrument technician can
          read it without ambiguity.
        all_control_loops_fully_shown: >
          Correct. A control loop on a P&ID must show all three elements: the measurement
          point, the controller block, and the final control element. A loop shown with any
          element missing is incomplete and cannot be used for commissioning or maintenance.
        independent_high_high_temp_interlock_shown_separately: >
          Correct. The temperature control loop and the high-high temperature safety trip
          are two different systems serving two different functions. Showing them as separate
          systems on the P&ID reflects the independence requirement established in Mission 2
          and confirmed in Mission 5.
        manual_block_valves_on_major_lines: >
          Correct. Block valves make equipment isolatable for maintenance and inspection
          without shutting down the entire plant. Their location on the P&ID defines the
          isolation philosophy for every piece of equipment.
        check_valves_on_feed_and_product_lines: >
          Correct. Check valves prevent process material from flowing backward — into the
          feed system or into product that has already been quality-checked. Their presence
          on the P&ID ensures they are included in fabrication and are visible to operators
          and maintenance technicians.
        pipe_spec_breaks_on_pid: >
          Correct. A pipe specification break marks exactly where the pipe material, wall
          thickness, or pressure rating changes. Without spec breaks on the P&ID, fabricators
          do not know which specification applies where, and the risk of using the wrong
          material on a corrosive or high-pressure section increases.
        reactor_relief_valve_with_discharge_routing: >
          Correct. The relief valve and its discharge routing are both safety-critical items.
          Showing only the valve without its discharge line leaves the P&ID incomplete —
          the safe disposal destination must be traceable on the drawing.
        sample_points_on_product_and_key_streams: >
          Correct. Sample points are physical connections installed in the pipe. They must
          appear on the P&ID so they are included in fabrication, are accessible for
          maintenance, and are known to operators taking quality samples.
        esd_connections_to_final_elements: >
          Correct. Every final control element or isolation valve that the ESD system
          operates must show its ESD connection on the P&ID. This traceability is essential
          for hazard study review, commissioning, and ongoing safety testing of the ESD logic.
      incorrect:
        three_d_pipe_routing_on_pid: >
          Incorrect. Three-dimensional pipe routing shows how pipes navigate around structural
          elements, equipment, and each other in physical space. This information belongs on
          isometric drawings and pipe rack models, not on the P&ID.
        structural_civil_details_on_pid: >
          Incorrect. Structural steelwork, foundations, and architectural elements are the
          domain of civil and structural engineering drawings. Including them on the P&ID
          would make it illegible and misrepresent its scope.
        vendor_internal_details_on_pid: >
          Incorrect. The P&ID shows equipment as a block with its external connections. What
          is inside — tray layout, tube arrangement, packing type — is vendor design information
          shown on vendor drawings, not the P&ID.
        electrical_wiring_on_pid: >
          Incorrect. Instrument symbols on the P&ID use ISA notation to communicate the
          function and location of instruments. The actual wiring — cable routes, junction
          boxes, terminal connections — is documented in electrical and loop diagrams, not
          the P&ID.
        utility_header_full_detail_on_process_pid: >
          Incorrect. The process P&ID shows utility connections at each process equipment item.
          The utility distribution system — headers, supply and return manifolds, branch
          connections — is normally detailed on separate utility P&IDs to keep the process
          drawing readable.
        require_fea_before_package_approval: >
          Incorrect. Finite element analysis of the reactor vessel is detailed mechanical
          design work that follows process package approval. Holding the design package
          for FEA delays the entire project — the process design, including equipment
          specification and P&ID development, proceeds in parallel with detailed mechanical
          design, not after it.
        approve_package_despite_open_data_gaps: >
          Incorrect. Open data gaps — unconfirmed VLE data, waste characterisation gaps,
          unvalidated summer cooling water temperature assumptions — must be documented as
          open items in the design package. Ignoring them creates downstream risk for
          detailed engineering, procurement, and operations.
      missed:
        default: >
          Missed decision. This item is a standard required element of a Process and
          Instrumentation Diagram, as described in the P&ID versus PFD section, control
          and safety requirements, or isolation and protection hardware sections.
          Re-check those sections.

    review_summary_template:
      - "You selected {correct_selected_count} out of {total_correct_count} required P&ID elements."
      - "You missed {missed_count} required elements."
      - "You selected {incorrect_selected_count} elements that do not belong on a P&ID."
      - "Final score: {score_percent}%."

    telemetry_events:
      - level_started
      - bod_opened
      - decision_card_selected
      - decision_card_deselected
      - level_submitted
      - feedback_viewed
      - level_passed
      - level_retried
