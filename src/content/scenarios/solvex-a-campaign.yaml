    scoring:
      mode: deterministic_easy
      pass_threshold_percent: 70
      perfect_threshold_percent: 100
      points:
        correct_selection: 1
        missed_correct: -0.5
        incorrect_selection: -0.25
        perfect_bonus: 1
      result_bands:
        - id: excellent
          min_percent: 90
          title: "Safety basis well defined"
          message: "You identified the key plant-wide safety requirements, applied independent-layers-of-protection thinking, and correctly deferred detailed safety design until after the hazard study."
        - id: pass
          min_percent: 70
          title: "Acceptable first review"
          message: "You caught the main safety requirements, but some protection measures were missed or incorrectly specified. Review the feedback and re-check the hazard summary and protection philosophy."
        - id: retry
          min_percent: 0
          title: "Needs revision"
          message: "The safety-system design basis is not yet defensible. Re-read the hazard summary, regulatory requirements, and protection philosophy, and select only decisions directly supported by the data."

    senior_engineer_explanations:
      correct:
        hazardous_area_classification_feed_a: >
          Correct. Feed A is a flammable liquid that can form an ignitable vapor-air mixture.
          Electrical equipment in areas where this vapor may be present must be rated for the
          zone classification. This is a regulatory requirement as well as a design-basis decision.
        emergency_isolation_valves_feed_a: >
          Correct. Cutting off the flammable feed supply is a primary action during any
          major process emergency. Emergency isolation valves on Feed A lines are a fundamental
          ESD requirement for flammable liquid handling.
        plant_esd_system: >
          Correct. The design basis explicitly requires an ESD system. At this stage the task
          is to confirm it must exist and that it covers all process sections. ESD logic and
          final design come later, after the hazard study.
        fire_and_gas_detection: >
          Correct. Gas and flame detection is a standard first layer of protection and early
          warning system for any plant handling flammable materials. It is a design-basis
          requirement that must be confirmed before the detailed design can be scoped.
        bunding_for_liquid_storage: >
          Correct. Secondary containment bunding prevents flammable Feed A spills from spreading
          to ignition sources and confines corrosive Feed B spills to a controlled area.
          Both materials require bunding regardless of their different hazard classifications.
        mandate_hazop_before_detailed_design: >
          Correct. HAZOP is a design-basis commitment, not an optional later exercise. It must
          be completed before safety-critical equipment is specified so that the hazard analysis
          drives the design rather than confirming it retrospectively.
        identify_relief_scenarios_reactor_and_separation: >
          Correct. Identifying which scenarios can cause overpressure is within design-basis
          scope — it defines what the relief system must handle. Sizing the devices themselves
          requires detailed data and is a separate later step.
        closed_safe_disposal_for_relief_and_vents: >
          Correct. Relieving flammable or potentially toxic vapors to open atmosphere creates
          a secondary fire or toxicity hazard. All relief and emergency vent discharge must
          be directed to a disposal system — a flare, thermal oxidizer, or scrubber — before
          the stream reaches atmosphere.
        passive_fire_protection_steelwork: >
          Correct. A pool fire under structural steel can heat it to failure temperature within
          minutes, causing vessel collapse and escalation. Passive fire protection on structural
          members in hazardous areas is standard practice for plants handling flammable liquids.
      incorrect:
        atex_zone_0_entire_plant: >
          Not justified. Zone 0 means a flammable atmosphere is present continuously or for
          long periods. Applying it blanket to the entire plant avoids the zone analysis work
          but massively over-specifies electrical equipment and drives unnecessary cost. A
          zone classification study is required.
        operator_procedures_only_for_esd: >
          Not justified. Human response time and reliability are insufficient as the sole
          protection layer for a credible exothermic runaway. The design basis requires
          independent protection layers, which means automatic systems that do not depend
          on operator action alone.
        size_all_relief_valves_now: >
          Not justified. Relief valve sizing requires knowledge of the worst credible case
          for each vessel, including fire case, blocked outlet, runaway, and other scenarios.
          This data comes from the hazard study, which has not yet been performed.
        extra_controllers_as_safety_layers: >
          Incorrect. The basic process control system and the safety instrumented system
          must be independent. Adding more controllers to the BPCS does not create
          independent safety layers — it reinforces the same layer that is already counted.
        skip_bunding_for_feed_b: >
          Incorrect. Corrosive materials require secondary containment to protect personnel,
          infrastructure, and the environment from spills, regardless of whether they are
          flammable. Feed B is explicitly described as corrosive at high concentration.
        assign_sil_before_hazop: >
          Not justified. SIL determination requires tolerable risk targets, initiating event
          frequencies, and consequence severities — all outputs of the hazard study. Assigning
          SIL levels before the study produces numbers without technical basis.
        inherently_safer_over_layers_of_protection: >
          Not justified. Inherently safer design is a valuable principle, but it applies at
          the process-development and chemistry-selection stage — the point at which hazardous
          materials, inventories, and reaction chemistries can be substituted or minimised.
          At detailed design stage the feedstock and process chemistry are fixed decisions made
          by product requirements. The task now is to manage the accepted hazards through
          independent layers of protection, not to revisit the fundamental process definition.
      missed:
        default: >
          Missed decision. This selection is directly supported by the hazard summary,
          regulatory requirements, or protection philosophy described in the design basis.
          Re-check those sections.

    review_summary_template:
      - "You selected {correct_selected_count} out of {total_correct_count} required safety decisions."
      - "You missed {missed_count} required decisions."
      - "You selected {incorrect_selected_count} unsupported decisions."
      - "Final score: {score_percent}%."

