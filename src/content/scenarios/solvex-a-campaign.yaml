    learning_goals:
      - "Convert product purity, impurity, water-content, and stream-property clues into separation requirements."
      - "Distinguish between a separation requirement and a specific equipment selection."
      - "Recognise that separation choices depend on physical property data that may not yet be available."
      - "Avoid jumping to over-specific equipment choices or detailed simulation too early."
      - "Link Feed B aqueous catalyst feed to downstream water-removal needs."

    briefing:
      senior_engineer_message: >
        The reactor effluent contains Solvex-A, unreacted Feed A, light impurity X,
        water from Feed B, and dissolved catalyst residues. Your job is to outline the
        separation train — not to size equipment yet. Read the clues about purity,
        water, temperature sensitivity, and physical property gaps. Select only the
        separation-section design-basis decisions that are justified.

    instructions:
      prompt: >
        Select the separation-section design-basis decisions that are justified by the
        information above. Focus on what the separation train must accomplish, not on
        detailed equipment dimensions.
      selection_rule: "Select all that apply."
      expected_time_minutes: 6

    categories:
      - id: separation_system
        label: "Separation System"
      - id: heat_transfer_and_utilities
        label: "Heat Transfer & Utilities"
      - id: environmental_treatment
        label: "Environmental Treatment"
      - id: process_control_and_safety
        label: "Process Control & Safety"
      - id: unsupported_for_now
        label: "Not Justified Yet"

    decision_cards:
      - id: sep_light_impurity_removal
        category: separation_system
        label: "Include a light-impurity removal step in the separation train"
        type: correct
        linked_clues:
          - "Light impurity X has a lower normal boiling point than Solvex-A."
          - "Final Solvex-A purity shall be at least 98.5 wt%."
        short_hint: "A known impurity with a boiling-point difference suggests a separation step."

      - id: sep_product_water_removal
        category: separation_system
        label: "Include a product water-removal or drying step"
        type: correct
        linked_clues:
          - "Water from Feed B aqueous catalyst solution."
          - "Final product water content shall be below 0.5 wt%."
        short_hint: "An aqueous feed plus a tight water spec means water must be removed."

      - id: sep_performance_targets
        category: separation_system
        label: "Define separation performance targets for purity and water content"
        type: correct
        linked_clues:
          - "Final Solvex-A purity shall be at least 98.5 wt%."
          - "Final product water content shall be below 0.5 wt%."
        short_hint: "Quantitative targets are needed before any equipment can be specified."

      - id: sep_request_vle_data
        category: separation_system
        label: "Request VLE or relative volatility data before locking a specific distillation design"
        type: correct
        linked_clues:
          - "Exact relative volatility and VLE data have not yet been confirmed."
        short_hint: "Without confirmed VLE data, any specific distillation design is premature."

      - id: sep_account_temp_sensitivity
        category: heat_transfer_and_utilities
        label: "Account for Solvex-A temperature sensitivity when choosing separation conditions"
        type: correct
        linked_clues:
          - "Product shall not be exposed to temperatures above 130 C for more than 5 minutes."
        short_hint: "Thermal degradation limits constrain reboiler temperatures and distillation pressure."

      - id: sep_water_routing_to_treatment
        category: environmental_treatment
        label: "Route water-rich purge and aqueous streams to downstream wastewater treatment"
        type: correct
        linked_clues:
          - "Aqueous purge and water-rich streams must be routed to wastewater neutralisation."
        short_hint: "Separation generates aqueous waste — it must be accounted for in the design."

      - id: sep_requirements_vs_sizing
        category: separation_system
        label: "Document separation requirements now; defer final equipment sizing to a later stage"
        type: correct
        linked_clues:
          - "Final column tray counts, column diameters, and rigorous simulation are outside scope."
        short_hint: "This mission defines what the separation must do, not the exact dimensions."

      - id: sep_evaluate_alternatives
        category: separation_system
        label: "Evaluate both distillation and non-distillation separation methods before selecting"
        type: correct
        linked_clues:
          - "Water forms a heterogeneous azeotrope with some organic components."
          - "Product shall not be exposed to temperatures above 130 C."
        short_hint: "Azeotrope behaviour and thermal sensitivity may make non-distillation methods attractive."

      - id: sep_link_feedb_to_water
        category: separation_system
        label: "Link Feed B aqueous catalyst feed to the downstream water-removal requirement"
        type: correct
        linked_clues:
          - "Water from Feed B aqueous catalyst solution."
          - "Final product water content shall be below 0.5 wt%."
        short_hint: "The water entering the process through Feed B must leave somewhere."

      - id: sep_cryogenic_no_data
        category: separation_system
        label: "Select cryogenic distillation without confirmed property or economic data"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Cryogenic service needs strong justification — boiling points alone are not enough."

      - id: sep_skip_water_removal
        category: separation_system
        label: "Skip water removal because Feed B is only a catalyst and water evaporates later"
        type: wrong_plausible
        linked_clues: []
        short_hint: "The 0.5 wt% water spec is a product requirement regardless of where water came from."

      - id: sep_purity_packaging_only
        category: separation_system
        label: "Treat 98.5 wt% purity as a packaging quality check, not a process design target"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Purity is achieved in the process, not at the packaging line."

      - id: sep_column_sizing_now
        category: separation_system
        label: "Select final column tray count, diameter, and height in the design-basis mission"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Equipment sizing needs confirmed VLE data and rigorous simulation — not available yet."

      - id: sep_full_simulation
        category: unsupported_for_now
        label: "Run full plant-wide rigorous process simulation at this stage"
        type: wrong_plausible
        linked_clues: []
        short_hint: "A rigorous simulation needs physical property data not yet confirmed."

      - id: sep_ignore_light_impurity
        category: separation_system
        label: "Ignore light impurity X because it appears in the feed, not in the product specification"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Impurities in the feed will end up in the product unless removed."

      - id: sep_high_temp_stripping
        category: heat_transfer_and_utilities
        label: "Use high-temperature steam stripping without checking Solvex-A temperature sensitivity"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Solvex-A degrades above 130 C — high-temperature stripping could destroy product."

    correct_decision_ids:
      - sep_light_impurity_removal
      - sep_product_water_removal
      - sep_performance_targets
      - sep_request_vle_data
      - sep_account_temp_sensitivity
      - sep_water_routing_to_treatment
      - sep_requirements_vs_sizing
      - sep_evaluate_alternatives
      - sep_link_feedb_to_water

    wrong_but_plausible_decision_ids:
      - sep_cryogenic_no_data
      - sep_skip_water_removal
      - sep_purity_packaging_only
      - sep_column_sizing_now
      - sep_full_simulation
      - sep_ignore_light_impurity
      - sep_high_temp_stripping

    scoring:
      mode: deterministic_easy
      pass_threshold_percent: 70
      perfect_threshold_percent: 100
      points:
        correct_selection: 1
        missed_correct: -0.5
        incorrect_selection: -0.25
        perfect_bonus: 1
      result_bands:
        - id: excellent
          min_percent: 90
          title: "Design review ready"
          message: "You correctly identified the required separation steps and avoided over-specifying equipment. The separation train outline is sound."
        - id: pass
          min_percent: 70
          title: "Acceptable first review"
          message: "You caught the main separation requirements, but some impurity, water, or property-data decisions were missed. Review the feedback."
        - id: retry
          min_percent: 0
          title: "Needs revision"
          message: "Your separation-section decision set is not yet defensible. Re-read the clues about feed composition, purity targets, and physical property gaps."

    senior_engineer_explanations:
      correct:
        sep_light_impurity_removal: >
          Correct. Light impurity X has a lower boiling point than Solvex-A, and the product purity
          target is 98.5 wt%. The separation train must include a step capable of removing this light
          component. The exact method depends on VLE data, but the requirement itself is clear.
        sep_product_water_removal: >
          Correct. Feed B introduces water into the process, and the final product water content must
          stay below 0.5 wt%. A water-removal or drying step must be part of the separation train —
          the water does not simply evaporate on its own.
        sep_performance_targets: >
          Correct. Before any equipment can be selected, the separation train needs defined targets:
          minimum Solvex-A recovery, maximum impurity carryover, and maximum water content. These
          become the basis for all downstream equipment decisions.
        sep_request_vle_data: >
          Correct. The relative volatility of Solvex-A and impurity X is not yet confirmed. Without
          reliable VLE data, you cannot select the correct number of stages, reflux ratio, or even
          confirm that distillation is the best method. Requesting this data is a proper design-basis step.
        sep_account_temp_sensitivity: >
          Correct. Solvex-A degrades above 130 C. This constraint affects choices like reboiler
          temperature, column operating pressure (and therefore relative volatility), and whether
          vacuum distillation or alternative separation methods are needed.
        sep_water_routing_to_treatment: >
          Correct. The separation train will generate aqueous purge streams. These must be accounted
          for in the design and routed to wastewater neutralisation. Full treatment design comes later,
          but the routing requirement belongs here in the separation section.
        sep_requirements_vs_sizing: >
          Correct. At the design-basis stage, your job is to define what the separation train must
          achieve — not the column diameter, tray count, or heat exchanger area. Those come after
          confirmed physical property data and rigorous simulation.
        sep_evaluate_alternatives: >
          Correct. The mixture includes water that can form azeotropes, and Solvex-A is
          temperature-sensitive. Distillation may work, but alternatives like extraction, adsorption,
          or membrane separation should be considered before locking in a specific technology.
        sep_link_feedb_to_water: >
          Correct. Feed B is an aqueous catalyst solution — water enters the process with it. The
          final product water limit is 0.5 wt%, so that water must be removed somewhere in the
          separation train. Tracing water from entry to exit is fundamental process engineering.
      incorrect:
        sep_cryogenic_no_data: >
          Not justified. Cryogenic distillation is expensive and energy-intensive. Nothing in the
          design basis indicates it is needed — the boiling point difference exists, but that alone
          does not justify cryogenic temperatures. Wait for confirmed VLE and economic data.
        sep_skip_water_removal: >
          Incorrect. Feed B is indeed a catalyst, but it is an aqueous solution. That water enters
          the reactor and leaves in the effluent. The product specification of under 0.5 wt% water
          applies regardless of the water's origin. Skipping water removal would fail the product spec.
        sep_purity_packaging_only: >
          Incorrect. Purity is achieved by the process — separation, reaction selectivity, and impurity
          removal. Packaging cannot improve chemical purity. The 98.5 wt% target drives the entire
          separation train design.
        sep_column_sizing_now: >
          Not justified. Tray count, column diameter, and height require confirmed VLE data, validated
          thermodynamic models, and rigorous simulation. None of these are available at the design-basis
          stage. Your task is to define the separation requirements, not size the hardware.
        sep_full_simulation: >
          Not justified. A rigorous plant-wide simulation requires physical property data, kinetic
          parameters, and confirmed equilibrium data that are not yet available. The current mission
          is to outline the separation train — simulation comes later.
        sep_ignore_light_impurity: >
          Incorrect. Light impurity X is present in the reactor effluent. If the separation train
          does not remove it, it will end up in the Solvex-A product and violate the 98.5 wt% purity
          target. The impurity's source (feed or reaction) does not change the need to remove it.
        sep_high_temp_stripping: >
          Incorrect. Solvex-A degrades above 130 C. High-temperature steam stripping could destroy
          the product you are trying to purify. Always check thermal stability before choosing a
          high-temperature separation method.
      missed:
        default: >
          Missed decision. This choice is directly supported by the separation-section design basis.
          Re-check the separation feed composition, product specifications, and physical property
          constraints.

    review_summary_template:
      - "You selected {correct_selected_count} out of {total_correct_count} required separation decisions."
      - "You missed {missed_count} required decisions."
      - "You selected {incorrect_selected_count} unsupported decisions."
      - "Final score: {score_percent}%."

    telemetry_events:
      - level_started
      - bod_opened
      - decision_card_selected
      - decision_card_deselected
      - level_submitted
      - feedback_viewed
      - level_passed
      - level_retried

