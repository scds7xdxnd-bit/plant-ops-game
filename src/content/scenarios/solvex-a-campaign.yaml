      requires_perfect_score: false
    learning_goals:
      - "Identify plant-wide safety requirements implied by flammable feeds, corrosive materials, and a credible exothermic runaway."
      - "Distinguish between process control and independent safety protection layers."
      - "Recognise that a formal hazard review must precede detailed safety design."
      - "Apply the principle that relief and vent discharges must go to a safe disposal system."
      - "Avoid over-specifying safety measures before hazard analysis data is available."

    briefing:
      senior_engineer_message: >
        We have defined the process. Now we think about what happens when things go wrong.
        This plant handles a flammable organic feed, a corrosive catalyst, and runs an
        exothermic reaction with a credible runaway scenario. Your task is to identify the
        plant-wide safety-system design decisions that are directly supported by the hazard
        information in the design basis — and to recognise what cannot yet be specified
        without a formal hazard study.

    instructions:
      prompt: >
        Select the plant-wide safety-system design decisions that are justified by the hazard
        information above. Avoid specifying detailed safety designs that require hazard study
        outputs not yet available.
      selection_rule: "Select all that apply."
      expected_time_minutes: 7

    categories:
      - id: process_control_and_safety
        label: "Process Control & Safety"
      - id: reactor_system
        label: "Reactor System"
      - id: environmental_treatment
        label: "Environmental Containment"
      - id: unsupported_for_now
        label: "Not Justified Yet"

    decision_cards:
      - id: hazardous_area_classification_feed_a
        category: process_control_and_safety
        label: "Classify Feed A storage and handling areas as hazardous for electrical equipment selection"
        type: correct
        linked_clues:
          - "Feed A is a flammable liquid organic. Vapors can form an ignitable mixture with air."
          - "Hazardous area classification is required for all areas where a flammable atmosphere may exist."
        short_hint: "Flammable liquid handling areas require hazardous area zone classification."

      - id: emergency_isolation_valves_feed_a
        category: process_control_and_safety
        label: "Include emergency isolation valves on flammable Feed A supply lines to the process"
        type: correct
        linked_clues:
          - "Feed A is a flammable liquid organic."
          - "An emergency shutdown system is required."
        short_hint: "Isolating the flammable feed supply is a primary ESD action."

      - id: plant_esd_system
        category: process_control_and_safety
        label: "Specify a plant emergency shutdown system to safely isolate and depressurize all process sections"
        type: correct
        linked_clues:
          - "An emergency shutdown system is required to safely isolate and depressurize the plant."
        short_hint: "ESD is explicitly required by the design basis."

      - id: fire_and_gas_detection
        category: process_control_and_safety
        label: "Include a fire and gas detection system covering all flammable material handling areas"
        type: correct
        linked_clues:
          - "Feed A is a flammable liquid organic. Vapors can form an ignitable mixture with air."
          - "Hazardous area classification is required."
        short_hint: "Gas detection is a standard first layer of protection for flammable feed areas."

      - id: bunding_for_liquid_storage
        category: environmental_treatment
        label: "Provide liquid containment bunding for all chemical storage areas including Feed A and Feed B"
        type: correct
        linked_clues:
          - "Feed A is a flammable liquid organic."
          - "Feed B is a corrosive aqueous catalyst solution."
        short_hint: "Bunding contains spills of both flammable and corrosive liquids."

      - id: mandate_hazop_before_detailed_design
        category: process_control_and_safety
        label: "Require a formal hazard and operability study to be completed before detailed safety engineering begins"
        type: correct
        linked_clues:
          - "A formal hazard and operability study is required before detailed engineering begins."
          - "Safety system design requires hazard study outputs before it can be completed."
        short_hint: "HAZOP is a design-basis commitment, not an optional later step."

      - id: identify_relief_scenarios_reactor_and_separation
        category: reactor_system
        label: "Identify all relief device scenarios for the reactor and separation sections in the design basis"
        type: correct
        linked_clues:
          - "Runaway can cause overpressure through vapor formation and gas generation."
          - "Detailed relief system sizing is outside scope at this stage."
        short_hint: "Identifying scenarios is within design-basis scope; sizing devices is not."

      - id: closed_safe_disposal_for_relief_and_vents
        category: process_control_and_safety
        label: "Route all pressure relief and emergency venting to a closed safe disposal system"
        type: correct
        linked_clues:
          - "Feed A is flammable."
          - "Solvex-A is a specialty organic; hazard properties are under review."
          - "Runaway generates vapor and decomposition gases."
        short_hint: "Open-atmosphere relief discharge is not acceptable for flammable or potentially toxic streams."

      - id: passive_fire_protection_steelwork
        category: process_control_and_safety
        label: "Specify passive fire protection for structural steelwork supporting vessels in hazardous areas"
        type: correct
        linked_clues:
          - "Feed A is a flammable liquid organic."
          - "The plant handles flammable materials in process areas."
        short_hint: "A pool fire under structural steel can cause vessel collapse; PFP maintains structural integrity."

      - id: atex_zone_0_entire_plant
        category: unsupported_for_now
        label: "Classify the entire plant as ATEX Zone 0 as a conservative blanket approach"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Zone classification must be based on a study, not applied blanket to avoid the analysis."

      - id: operator_procedures_only_for_esd
        category: process_control_and_safety
        label: "Rely on operator procedures alone for all emergency actions without automatic ESD logic"
        type: wrong_plausible
        linked_clues:
          - "An emergency shutdown system is required."
          - "Independent layers of protection are required for the reactor runaway hazard."
        short_hint: "Human response alone is not an independent protection layer for a credible runaway."

      - id: size_all_relief_valves_now
        category: unsupported_for_now
        label: "Perform full relief valve sizing calculations for all vessels at this design-basis stage"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Detailed relief valve sizing requires hazard study outputs and stream data not yet available."

      - id: extra_controllers_as_safety_layers
        category: process_control_and_safety
        label: "Add redundant process controllers as the safety protection layer for the runaway hazard"
        type: wrong_plausible
        linked_clues:
          - "Safety instrumented functions must be independent of the basic process control system."
        short_hint: "The basic process control system is not an independent safety layer."

      - id: skip_bunding_for_feed_b
        category: environmental_treatment
        label: "Omit secondary containment for Feed B storage because it is aqueous and not classified as flammable"
        type: wrong_plausible
        linked_clues:
          - "Feed B is a corrosive aqueous catalyst solution at high concentration."
        short_hint: "Bunding is required for corrosive materials regardless of flammability classification."

      - id: assign_sil_before_hazop
        category: unsupported_for_now
        label: "Assign SIL ratings to all safety instrumented functions before the hazard study is completed"
        type: wrong_plausible
        linked_clues:
          - "A formal hazard and operability study is required before detailed engineering begins."
          - "Safety system design requires hazard study outputs."
        short_hint: "SIL determination requires hazard frequency and consequence data from the hazard study."

      - id: inherently_safer_over_layers_of_protection
        category: unsupported_for_now
        label: "Apply inherently safer design to eliminate all major accident hazards as an alternative to engineered protection layers"
        type: wrong_plausible
        linked_clues: []
        short_hint: "Inherent safety applies at the process-development stage; at detailed design the feedstock and chemistry are fixed — the task is to manage accepted hazards through protection layers."

